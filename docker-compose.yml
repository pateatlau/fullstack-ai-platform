services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: chatbot-frontend
    ports:
      - '80:80'
    depends_on:
      backend-nodejs:
        condition: service_healthy
        required: false
      backend-python:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost/health',
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend-nodejs:
    profiles:
      - nodejs
    build:
      context: ./backend-nodejs
      dockerfile: Dockerfile
    container_name: chatbot-backend-nodejs
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: development
      PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      CORS_ALLOWED_ORIGINS: http://localhost
      APP_ENV: development
      MAX_MESSAGE_LENGTH: 4000
      REQUEST_TIMEOUT_SECONDS: 30
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8000/api/health',
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend-python:
    profiles:
      - python
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: chatbot-backend-python
    ports:
      - '8000:8000'
    environment:
      PORT: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      CORS_ALLOWED_ORIGINS: http://localhost
      APP_ENV: development
      MAX_MESSAGE_LENGTH: 4000
      REQUEST_TIMEOUT_SECONDS: 30
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://chatbot:chatbot@postgres:5432/chatbot}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    profiles:
      - python
    image: postgres:16-alpine
    container_name: chatbot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
