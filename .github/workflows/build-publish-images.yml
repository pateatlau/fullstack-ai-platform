name: Build and Publish Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'release-*'

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.compute.outputs.frontend }}
      backend-nodejs: ${{ steps.compute.outputs['backend-nodejs'] }}
      backend-python: ${{ steps.compute.outputs['backend-python'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed app paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend-nodejs:
              - 'backend-nodejs/**'
            backend-python:
              - 'backend-python/**'

      - name: Compute effective service matrix
        id: compute
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Release tags should publish all service images from the tagged commit.
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "backend-nodejs=true" >> "$GITHUB_OUTPUT"
            echo "backend-python=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "backend-nodejs=${{ steps.filter.outputs['backend-nodejs'] }}" >> "$GITHUB_OUTPUT"
            echo "backend-python=${{ steps.filter.outputs['backend-python'] }}" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    name: Build and Publish Frontend Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fullstack-ai-platform-frontend
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Capture build metadata
        shell: bash
        run: |
          cat > frontend-build-metadata.json <<'JSON'
          {
            "service": "frontend",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "tags": ${{ steps.meta.outputs.json }}
          }
          JSON

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-metadata
          path: frontend-build-metadata.json

  build-backend-nodejs:
    name: Build and Publish Backend Node.js Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs['backend-nodejs'] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fullstack-ai-platform-backend-nodejs
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend-nodejs
          file: ./backend-nodejs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Capture build metadata
        shell: bash
        run: |
          cat > backend-nodejs-build-metadata.json <<'JSON'
          {
            "service": "backend-nodejs",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "tags": ${{ steps.meta.outputs.json }}
          }
          JSON

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: backend-nodejs-build-metadata
          path: backend-nodejs-build-metadata.json

  build-backend-python:
    name: Build and Publish Backend Python Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs['backend-python'] == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fullstack-ai-platform-backend-python
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend-python
          file: ./backend-python/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Capture build metadata
        shell: bash
        run: |
          cat > backend-python-build-metadata.json <<'JSON'
          {
            "service": "backend-python",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "tags": ${{ steps.meta.outputs.json }}
          }
          JSON

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: backend-python-build-metadata
          path: backend-python-build-metadata.json
