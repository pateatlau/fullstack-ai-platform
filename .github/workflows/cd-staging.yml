name: CD Staging Deploy

on:
  workflow_run:
    workflows:
      - Build and Publish Images
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-staging
  cancel-in-progress: false

permissions:
  contents: read
  checks: write

env:
  REGISTRY: ghcr.io

jobs:
  preflight:
    name: Prepare Staging Deployment Metadata
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      owner: ${{ steps.meta.outputs.owner }}
      started_at: ${{ steps.meta.outputs.started_at }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Compose immutable artifact references
        id: meta
        shell: bash
        run: |
          owner_raw='${{ github.event.workflow_run.repository.owner.login }}'
          owner="${owner_raw,,}"
          image_tag="sha-${{ github.event.workflow_run.head_sha }}"
          started_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          backend_image="${{ env.REGISTRY }}/${owner}/fullstack-ai-platform-backend-nodejs:${image_tag}"
          frontend_image="${{ env.REGISTRY }}/${owner}/fullstack-ai-platform-frontend:${image_tag}"

          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "started_at=${started_at}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"

          {
            echo "### Staging Deploy Metadata"
            echo "- Environment: staging"
            echo "- Trigger workflow: ${{ github.event.workflow_run.name }}"
            echo "- Source SHA: ${{ github.event.workflow_run.head_sha }}"
            echo "- Immutable backend image: ${backend_image}"
            echo "- Immutable frontend image: ${frontend_image}"
            echo "- Started at (UTC): ${started_at}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-backend:
    name: Deploy Staging Backend
    runs-on: ubuntu-latest
    environment: staging
    needs: preflight
    steps:
      - name: Validate staging backend contract
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_BACKEND_DEPLOY_WEBHOOK_URL }}
          STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
        shell: bash
        run: |
          test -n "$DEPLOY_WEBHOOK_URL" || {
            echo "Missing secret: STAGING_BACKEND_DEPLOY_WEBHOOK_URL" >&2
            exit 1
          }
          test -n "$STAGING_API_BASE_URL" || {
            echo "Missing variable: STAGING_API_BASE_URL" >&2
            exit 1
          }

      - name: Trigger staging backend deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_BACKEND_DEPLOY_WEBHOOK_URL }}
          BACKEND_IMAGE: ${{ needs.preflight.outputs.backend_image }}
          IMAGE_TAG: ${{ needs.preflight.outputs.image_tag }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          STARTED_AT: ${{ needs.preflight.outputs.started_at }}
        shell: bash
        run: |
          payload="$(cat <<JSON
          {
            \"environment\": \"staging\",
            \"service\": \"backend-nodejs\",
            \"image\": \"${BACKEND_IMAGE}\",
            \"artifactTag\": \"${IMAGE_TAG}\",
            \"sourceSha\": \"${SOURCE_SHA}\",
            \"timestamp\": \"${STARTED_AT}\"
          }
          JSON
          )"

          curl --fail-with-body --silent --show-error \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data "$payload"

  verify-backend:
    name: Verify Staging Backend Health
    runs-on: ubuntu-latest
    needs: [preflight, deploy-backend]
    environment: staging
    steps:
      - name: Validate backend healthcheck variable
        env:
          BACKEND_HEALTHCHECK_URL: ${{ vars.STAGING_BACKEND_HEALTHCHECK_URL }}
        shell: bash
        run: |
          test -n "$BACKEND_HEALTHCHECK_URL" || {
            echo "Missing variable: STAGING_BACKEND_HEALTHCHECK_URL" >&2
            exit 1
          }

      - name: Probe backend /api/health
        env:
          BACKEND_HEALTHCHECK_URL: ${{ vars.STAGING_BACKEND_HEALTHCHECK_URL }}
        shell: bash
        run: |
          for attempt in {1..20}; do
            if curl --fail-with-body --silent --show-error "$BACKEND_HEALTHCHECK_URL"; then
              {
                echo "### Backend Verification"
                echo "- Endpoint: $BACKEND_HEALTHCHECK_URL"
                echo "- Result: PASS"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "Backend health check failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep 15
          done

  deploy-frontend:
    name: Deploy Staging Frontend
    runs-on: ubuntu-latest
    environment: staging
    needs: [preflight, verify-backend]
    steps:
      - name: Validate staging frontend contract
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_FRONTEND_DEPLOY_WEBHOOK_URL }}
          STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
        shell: bash
        run: |
          test -n "$DEPLOY_WEBHOOK_URL" || {
            echo "Missing secret: STAGING_FRONTEND_DEPLOY_WEBHOOK_URL" >&2
            exit 1
          }
          test -n "$STAGING_API_BASE_URL" || {
            echo "Missing variable: STAGING_API_BASE_URL" >&2
            exit 1
          }

      - name: Trigger staging frontend deploy hook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_FRONTEND_DEPLOY_WEBHOOK_URL }}
          FRONTEND_IMAGE: ${{ needs.preflight.outputs.frontend_image }}
          IMAGE_TAG: ${{ needs.preflight.outputs.image_tag }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          STARTED_AT: ${{ needs.preflight.outputs.started_at }}
          STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
        shell: bash
        run: |
          payload="$(cat <<JSON
          {
            \"environment\": \"staging\",
            \"service\": \"frontend\",
            \"image\": \"${FRONTEND_IMAGE}\",
            \"artifactTag\": \"${IMAGE_TAG}\",
            \"sourceSha\": \"${SOURCE_SHA}\",
            \"timestamp\": \"${STARTED_AT}\",
            \"viteApiBaseUrl\": \"${STAGING_API_BASE_URL}\"
          }
          JSON
          )"

          curl --fail-with-body --silent --show-error \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            --data "$payload"

  verify-frontend:
    name: Verify Staging Frontend Reachability
    runs-on: ubuntu-latest
    needs: [preflight, deploy-frontend]
    environment: staging
    steps:
      - name: Validate frontend healthcheck variable
        env:
          FRONTEND_HEALTHCHECK_URL: ${{ vars.STAGING_FRONTEND_HEALTHCHECK_URL }}
        shell: bash
        run: |
          test -n "$FRONTEND_HEALTHCHECK_URL" || {
            echo "Missing variable: STAGING_FRONTEND_HEALTHCHECK_URL" >&2
            exit 1
          }

      - name: Probe frontend health endpoint
        env:
          FRONTEND_HEALTHCHECK_URL: ${{ vars.STAGING_FRONTEND_HEALTHCHECK_URL }}
        shell: bash
        run: |
          for attempt in {1..20}; do
            if curl --fail-with-body --silent --show-error "$FRONTEND_HEALTHCHECK_URL"; then
              {
                echo "### Frontend Verification"
                echo "- Endpoint: $FRONTEND_HEALTHCHECK_URL"
                echo "- Result: PASS"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "Frontend health check failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep 15
          done

  report:
    name: Publish Staging Deployment Check
    runs-on: ubuntu-latest
    if: always() && github.event.workflow_run.conclusion == 'success'
    needs: [preflight, verify-backend, verify-frontend]
    steps:
      - name: Publish deployment check-run
        uses: actions/github-script@v7
        with:
          script: |
            const success = [
              '${{ needs.verify-backend.result }}',
              '${{ needs.verify-frontend.result }}',
            ].every((result) => result === 'success');

            const summary = [
              'Environment: staging',
              `Source SHA: ${{ github.event.workflow_run.head_sha }}`,
              `Backend image: ${{ needs.preflight.outputs.backend_image }}`,
              `Frontend image: ${{ needs.preflight.outputs.frontend_image }}`,
              `Started at: ${{ needs.preflight.outputs.started_at }}`,
              `Backend health endpoint: ${{ vars.STAGING_BACKEND_HEALTHCHECK_URL }}`,
              `Frontend health endpoint: ${{ vars.STAGING_FRONTEND_HEALTHCHECK_URL }}`,
              `Verification result: ${success ? 'PASS' : 'FAIL'}`,
            ].join('\n');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Staging Deployment',
              head_sha: '${{ github.event.workflow_run.head_sha }}',
              status: 'completed',
              conclusion: success ? 'success' : 'failure',
              output: {
                title: success ? 'Staging deployment succeeded' : 'Staging deployment failed',
                summary,
              },
            });

      - name: Fail workflow when deployment checks fail
        if: needs.verify-backend.result != 'success' || needs.verify-frontend.result != 'success'
        run: exit 1
